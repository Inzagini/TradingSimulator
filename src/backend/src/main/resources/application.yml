server:
  port: 8000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trading_db
    username: trader
    password: trader_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
